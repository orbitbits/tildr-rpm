name: Release from Tildr

on:
  schedule:
    - cron: '0 0 * * 6'   # every Saturday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.compare.outputs.new_tag }}
      should_build: ${{ steps.compare.outputs.should_build }}
    steps:
      - name: Get latest tildr release
        id: tildr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo orbitbits/tildr --json tagName -q .tagName 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "No release found on orbitbits/tildr"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Latest tildr release: ${TAG}"
          echo "new_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check if already published here
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tildr.outputs.new_tag }}"
          if [ -z "$TAG" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release ${TAG} already exists here — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New release detected: ${TAG}"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "new_tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container: fedora:${{ matrix.fedora }}
    strategy:
      matrix:
        fedora: ['42', '43', '44']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y rpm-build curl git make

      - name: Build RPM
        env:
          PKGVER: ${{ needs.check.outputs.new_tag }}
        run: make build

      - name: Lint spec
        continue-on-error: true
        run: |
          dnf install -y rpmlint
          make lint

      - name: Collect RPMs
        run: |
          mkdir -p rpms
          for rpm in rpmbuild/RPMS/x86_64/*.rpm; do
            base="${rpm%.rpm}"
            mv "$rpm" "rpms/$(basename "${base}.fc${{ matrix.fedora }}.rpm")"
          done

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-fedora-${{ matrix.fedora }}
          path: rpms/*.rpm
          retention-days: 5

  release:
    needs: [check, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all RPM artifacts
        uses: actions/download-artifact@v4
        with:
          path: rpms/
          pattern: rpm-fedora-*
          merge-multiple: true

      - name: List RPMs
        run: |
          echo "Downloaded RPMs:"
          find rpms/ -name "*.rpm" -exec ls -lh {} \;

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check.outputs.new_tag }}"
          gh release create "$TAG" \
            --title "Release ${TAG}" \
            --generate-notes \
            rpms/*.rpm

  publish:
    needs: [check, release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c rpm gnupg

      - name: Import GPG key
        id: gpg
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          # See publish-repo.yml for why we key off the fingerprint here
          # instead of a hardcoded user-id string.
          FPR=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')
          if [ -z "$FPR" ]; then
            echo "::error::No GPG secret key found after import"
            exit 1
          fi
          echo "fingerprint=$FPR" >> "$GITHUB_OUTPUT"

      - name: Download RPMs from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check.outputs.new_tag }}"
          mkdir -p tmp-rpms
          gh release download "$TAG" -p "*.rpm" -D tmp-rpms/ --skip-existing
          echo "Downloaded RPMs:"
          ls -la tmp-rpms/

      - name: Distribute RPMs by Fedora version
        run: |
          for ver in 42 43 44; do
            mkdir -p "repo/fedora/${ver}/x86_64"
          done

          for rpm in tmp-rpms/*.rpm; do
            [ -f "$rpm" ] || continue
            name=$(basename "$rpm")
            matched=false
            for ver in 42 43 44; do
              if echo "$name" | grep -qE "\.fc${ver}\."; then
                cp "$rpm" "repo/fedora/${ver}/x86_64/"
                echo "  ${name} -> Fedora ${ver}"
                matched=true
                break
              fi
            done
            if [ "$matched" = false ]; then
              echo "WARNING: No Fedora version match for ${name}, skipping"
            fi
          done

          echo ""
          for ver in 42 43 44; do
            echo "Fedora ${ver}:"
            ls -la "repo/fedora/${ver}/x86_64/" 2>/dev/null || echo "  (empty)"
          done

      - name: Sign RPMs
        run: |
          # 1. Import public key into RPM database (file, not pipe — pipe
          #    can fail silently on some rpm versions).
          gpg --batch --yes --export -a "${{ steps.gpg.outputs.fingerprint }}" > /tmp/tildr-pub.gpg
          rpm --import /tmp/tildr-pub.gpg
          rm -f /tmp/tildr-pub.gpg

          # 2. Write passphrase to a real file so gpg --passphrase-file
          #    can read it reliably on every invocation (process-substitution
          #    pipes are one-shot and break when multiple RPMs are signed).
          echo "${{ secrets.GPG_PASSPHRASE }}" > /tmp/.gpg-passphrase

          # 3. Configure rpmmacros for embedded signatures.
          cat > ~/.rpmmacros <<EOF
          %_signature gpg
          %_gpg_name ${{ steps.gpg.outputs.fingerprint }}
          %_gpg_path ${HOME}/.gnupg
          %_gpgbin /usr/bin/gpg
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-armor --no-tty --pinentry-mode loopback --passphrase-file /tmp/.gpg-passphrase --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} %{__plaintext_filename}
          EOF

          # 4. Sign each RPM (embedded header signature).
          for ver in 42 43 44; do
            for rpm in repo/fedora/${ver}/x86_64/*.rpm; do
              [ -f "$rpm" ] || continue
              echo "Signing: $rpm"
              rpm --addsign "$rpm"
            done
          done
          rm -f /tmp/.gpg-passphrase

          # 5. Verify — checks against the RPM database (populated by rpm --import above).
          echo "Verifying embedded signatures..."
          for ver in 42 43 44; do
            for rpm in repo/fedora/${ver}/x86_64/*.rpm; do
              [ -f "$rpm" ] || continue
              if ! rpm -K "$rpm" | grep -q "digests signatures OK"; then
                echo "::error::$rpm signature verification failed"
                rpm -K "$rpm"
                exit 1
              fi
              echo "  OK: $(basename "$rpm")"
            done
          done

      - name: Generate repository metadata
        run: |
          for ver in 42 43 44; do
            dir="repo/fedora/${ver}/x86_64"
            if [ -d "$dir" ] && ls "$dir"/*.rpm &>/dev/null; then
              echo "Creating repo metadata for Fedora $ver..."
              createrepo_c --no-database "$dir/"

              echo "Signing repomd.xml..."
              echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch \
                --pinentry-mode loopback \
                --passphrase-fd 0 \
                --local-user "${{ steps.gpg.outputs.fingerprint }}" \
                --yes --detach-sign --armor "${dir}/repodata/repomd.xml"
            fi
          done

      - name: Export public key
        run: |
          gpg --batch --yes --export -a "${{ steps.gpg.outputs.fingerprint }}" > repo/tildr-rpm-pub.gpg
          if [ ! -s repo/tildr-rpm-pub.gpg ]; then
            echo "::error::Exported GPG public key file is empty"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: repo
          keep_files: true
          destination_dir: .
